name: Release - Build & Publish CLI

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.1'

permissions:
  contents: write

jobs:
  # ─── Build cross-platform binaries ─────────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: shoehorn_linux_amd64
          - goos: linux
            goarch: arm64
            artifact: shoehorn_linux_arm64
          - goos: darwin
            goarch: amd64
            artifact: shoehorn_darwin_amd64
          - goos: darwin
            goarch: arm64
            artifact: shoehorn_darwin_arm64
          - goos: windows
            goarch: amd64
            artifact: shoehorn_windows_amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${INPUT_TAG#v}"
          else
            VERSION="${REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BINARY_NAME="shoehorn"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="shoehorn.exe"
          fi
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${BINARY_NAME}" \
            ./cmd/shoehorn

      - name: Package archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${{ matrix.artifact }}.zip" shoehorn.exe
          else
            tar czf "${{ matrix.artifact }}.tar.gz" shoehorn
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 1

  # ─── Checksums ─────────────────────────────────────────────────────────────
  checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd binaries
          sha256sum shoehorn_*.tar.gz shoehorn_*.zip > checksums.txt
          echo "Checksums:"
          cat checksums.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: checksums
          path: binaries/checksums.txt
          retention-days: 1

  # ─── Publish Scoop Manifest ──────────────────────────────────────────────
  publish-scoop:
    name: Publish Scoop Manifest
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 10

    steps:
      - name: Determine tag and version
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: checksums
          path: .

      - name: Parse Windows checksum
        id: sha
        run: |
          echo "windows_amd64=$(grep shoehorn_windows_amd64.exe.zip checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout scoop bucket
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: shoehorn-dev/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-bucket

      - name: Update scoop manifest
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          REPO: ${{ github.repository }}
          SHA_WINDOWS: ${{ steps.sha.outputs.windows_amd64 }}
        run: |
          cat > scoop-bucket/shoehorn.json <<EOF
          {
              "version": "${VERSION}",
              "description": "CLI for the Shoehorn Intelligent Developer Platform",
              "homepage": "https://github.com/${REPO}",
              "license": "Apache-2.0",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/${REPO}/releases/download/${TAG}/shoehorn_windows_amd64.exe.zip",
                      "hash": "${SHA_WINDOWS}"
                  }
              },
              "bin": "shoehorn.exe",
              "checkver": {
                  "github": "https://github.com/${REPO}"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/${REPO}/releases/download/v\$version/shoehorn_windows_amd64.exe.zip"
                      }
                  }
              }
          }
          EOF

          echo "Generated scoop manifest:"
          cat scoop-bucket/shoehorn.json

      - name: Push manifest to scoop bucket
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shoehorn.json
          git diff --cached --quiet || git commit -m "Update shoehorn to ${TAG}"
          git push origin main

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, checksums]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine tag and version
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=$([[ "$TAG" == *-* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Create tag if workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Generate changelog from commits
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1)

          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges >> changelog.md
            echo "" >> changelog.md
            echo "" >> changelog.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> changelog.md
          else
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
            echo "Initial release" >> changelog.md
          fi

          echo "Changelog:"
          cat changelog.md

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          # Combine changelog + installation instructions
          cat > release-notes.md <<HEADER
          Command-line interface for the Shoehorn Intelligent Developer Platform.

          HEADER

          cat changelog.md >> release-notes.md

          cat >> release-notes.md <<EOF

          ## Installation

          ### Homebrew (macOS / Linux)

          \`\`\`bash
          brew tap shoehorn-dev/tap
          brew install shoehorn
          \`\`\`

          ### Mise (macOS / Linux / Windows)

          Add to your \`mise.toml\` or \`~/.config/mise/config.toml\`:

          \`\`\`toml
          [tools."github:shoehorn-dev/shoehorn-cli"]
          version = "latest"
          exe = "shoehorn"
          \`\`\`

          Then run \`mise install\`.

          > **Windows:** Add mise shims to your PowerShell profile:
          > \`\`\`powershell
          > Add-Content \\\$PROFILE '\\\$env:PATH = "\\\$env:LOCALAPPDATA\\mise\\shims;\\\$env:PATH"'
          > \`\`\`

          ### Manual download

          Download the binary for your platform, extract it, and add to your PATH.

          \`\`\`bash
          # macOS (Apple Silicon)
          curl -L https://github.com/\${{ github.repository }}/releases/download/${TAG}/shoehorn_darwin_arm64.tar.gz | tar xz
          sudo mv shoehorn /usr/local/bin/

          # macOS (Intel)
          curl -L https://github.com/\${{ github.repository }}/releases/download/${TAG}/shoehorn_darwin_amd64.tar.gz | tar xz
          sudo mv shoehorn /usr/local/bin/

          # Linux (amd64)
          curl -L https://github.com/\${{ github.repository }}/releases/download/${TAG}/shoehorn_linux_amd64.tar.gz | tar xz
          sudo mv shoehorn /usr/local/bin/

          # Linux (arm64)
          curl -L https://github.com/\${{ github.repository }}/releases/download/${TAG}/shoehorn_linux_arm64.tar.gz | tar xz
          sudo mv shoehorn /usr/local/bin/
          \`\`\`

          ### Scoop (Windows)

          \`\`\`powershell
          scoop bucket add shoehorn https://github.com/shoehorn-dev/scoop-bucket
          scoop install shoehorn
          \`\`\`

          **Or manual:** Download \`shoehorn_windows_amd64.exe.zip\`, extract, and add the folder to your PATH.

          > **macOS Gatekeeper:** If macOS blocks the binary with "developer cannot be verified", use Homebrew or Mise instead. These install methods verify integrity via SHA256 checksums automatically.

          ## Quick Start

          \`\`\`bash
          # Authenticate
          shoehorn auth login --server https://your-shoehorn.dev --token shp_xxx

          # Explore the catalog
          shoehorn get entities
          shoehorn search "payment"

          # Execute a Forge workflow
          shoehorn forge execute create-empty-github-repo \\
            --input name=my-service --input owner=my-org
          \`\`\`

          ## Verify integrity

          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`

          ## Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | macOS | arm64 (Apple Silicon) | \`shoehorn_darwin_arm64.tar.gz\` |
          | macOS | amd64 (Intel) | \`shoehorn_darwin_amd64.tar.gz\` |
          | Linux | amd64 | \`shoehorn_linux_amd64.tar.gz\` |
          | Linux | arm64 | \`shoehorn_linux_arm64.tar.gz\` |
          | Windows | amd64 | \`shoehorn_windows_amd64.exe.zip\` |
          EOF

          echo "Release notes written"

      - name: Delete existing release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release delete "${TAG}" --repo "${{ github.repository }}" --cleanup-tag --yes 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            ${PRERELEASE_FLAG} \
            release-assets/shoehorn_linux_amd64.tar.gz \
            release-assets/shoehorn_linux_arm64.tar.gz \
            release-assets/shoehorn_darwin_amd64.tar.gz \
            release-assets/shoehorn_darwin_arm64.tar.gz \
            release-assets/shoehorn_windows_amd64.exe.zip \
            release-assets/checksums.txt

  # ─── Publish Homebrew Formula ────────────────────────────────────────────
  publish-homebrew:
    name: Publish Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 10

    steps:
      - name: Determine tag and version
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: checksums
          path: .

      - name: Parse checksums
        id: sha
        run: |
          echo "darwin_amd64=$(grep shoehorn_darwin_amd64.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(grep shoehorn_darwin_arm64.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(grep shoehorn_linux_amd64.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(grep shoehorn_linux_arm64.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew formula
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          REPO: ${{ github.repository }}
          SHA_DARWIN_AMD64: ${{ steps.sha.outputs.darwin_amd64 }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.sha.outputs.linux_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          mkdir -p Formula
          cat > Formula/shoehorn.rb <<RUBY
          class Shoehorn < Formula
            desc "CLI for the Shoehorn Intelligent Developer Platform"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/shoehorn_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/shoehorn_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/shoehorn_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/shoehorn_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "shoehorn"
            end

            test do
              assert_match "Shoehorn CLI", shell_output("#{bin}/shoehorn version")
            end
          end
          RUBY

          echo "Generated Formula/shoehorn.rb"
          cat Formula/shoehorn.rb

      - name: Checkout tap repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: shoehorn-dev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Push formula to tap repo
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          mkdir -p tap/Formula
          cp Formula/shoehorn.rb tap/Formula/shoehorn.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shoehorn.rb
          git diff --cached --quiet || git commit -m "Update shoehorn to ${TAG}"
          git push origin main

